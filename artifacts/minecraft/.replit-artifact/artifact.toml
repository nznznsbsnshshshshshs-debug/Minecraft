kind = "web"
previewPath = "/"
title = "YGP Minecraft"
version = "1.0.0"
id = "artifacts/minecraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21886

[services.development]
run = "pnpm --filter @workspace/minecraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minecraft", "run", "build" ]
publicDir = "artifacts/minecraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21886"
BASE_PATH = "/"
