openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: youtube
    description: YouTube RSS feed operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /rss:
    get:
      operationId: getYouTubeRSS
      tags: [youtube]
      summary: Get YouTube RSS feed
      description: Returns latest videos from all YGP YouTube channels
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RSSFeedResponse"
        "500":
          description: RSS fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    VideoItem:
      type: object
      properties:
        title:
          type: string
        link:
          type: string
        published:
          type: string
        thumbnail:
          type: string
        videoId:
          type: string
        channel:
          type: string
      required:
        - title
        - link
        - published
        - thumbnail
        - videoId
        - channel
    RSSFeedResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoItem"
      required:
        - success
        - count
        - videos
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
